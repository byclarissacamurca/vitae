name: Build and deploy to GitHub Pages

on:
  # Roda a cada push na branch principal
  push:
    branches: ["master"]

  # Permite rodar manualmente pela aba Actions
  workflow_dispatch:

# Permissões do GITHUB_TOKEN necessárias para publicar no GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Só um deploy por vez; deixa o em andamento terminar antes do próximo
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Instalar dependências
        run: npm ci
      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Upload do artefato de build
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
